# Traefik Middleware for stripping /notification prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: notification-stripprefix
  namespace: smap
spec:
  stripPrefix:
    prefixes:
      - /notification

---
# Traefik IngressRoute for internal routing (K3s uses IngressRoute for middleware support)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notification-ingress
  namespace: smap
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: smap
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`smap-api.tantai.dev`) && PathPrefix(`/notification`)
      kind: Rule
      services:
        - name: notification-api
          port: 80
      middlewares:
        - name: notification-stripprefix
