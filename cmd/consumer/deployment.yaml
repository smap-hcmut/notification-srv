apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-consumer
  namespace: smap
  labels:
    app: notification-consumer
    version: v1
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: notification-consumer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: notification-consumer
        version: v1
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: notification-consumer
          image: registry.tantai.dev/smap/notification-consumer:260313-154401
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secrets
          env:
            - name: CONTAINER_NAME
              value: "notification-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
      terminationGracePeriodSeconds: 60
      restartPolicy: Always
