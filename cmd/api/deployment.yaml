apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: smap
  labels:
    app: notification-api
    version: v1
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: notification-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: notification-api
        version: v1
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: notification-api
          image: registry.tantai.dev/smap/notification-api:260310-010255
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: ws
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secrets
          env:
            - name: CONTAINER_NAME
              value: "notification-api"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: smap
  labels:
    app: notification-api
spec:
  selector:
    app: notification-api
  ports:
    - port: 80
      targetPort: 8081
      protocol: TCP
      name: ws
  type: ClusterIP
